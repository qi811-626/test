name: Revise PowerPoint presentation

on:
  push:
    branches:
      - codex/revise-ppt-presentation

permissions:
  contents: write
  pull-requests: write

env:
  BRANCH_NAME: codex/revise-ppt-presentation
  INPUT_PPTX: 管会pre.pptx
  OUTPUT_PPTX: output/管会pre_revised.pptx

jobs:
  revise-ppt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install lxml defusedxml markitdown[pptx] python-pptx

      - name: Revise presentation
        shell: bash
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: utf-8
        run: |
          set -euo pipefail
          mkdir -p output work

          python skills/pptx/scripts/office/unpack.py "$INPUT_PPTX" work/pptx_unpacked

          python - <<'PY'
          from pathlib import Path
          from lxml import etree

          root = Path('work/pptx_unpacked')
          ns = {'a': 'http://schemas.openxmlformats.org/drawingml/2006/main'}

          slide_replacements = {
              'slide1.xml': {0: 'Five Fundamental Principles', 1: 'of Ethics for Professional Accountants', 3: 'Date: 28 May 2026'},
              'slide3.xml': {
                  0: 'Principles 1-3: ', 1: 'Fundamental Principles',
                  2: 'APES 110 Section 110 sets out five core principles that guide professional accountants in serving the public interest.',
                  4: 'Be straightforward and honest in all professional and business relationships.',
                  6: 'Avoid bias, conflicts of interest, and undue influence when exercising professional judgment.',
                  8: 'Maintain professional knowledge and skill, and act diligently in accordance with applicable standards.',
              },
              'slide4.xml': {
                  0: 'Principles 1-3: ', 1: 'Applying the Concepts', 3: 'Integrity',
                  5: 'Do not be associated with false or misleading information; correct errors promptly.',
                  7: 'Objectivity',
                  9: 'Do not allow personal relationships or financial interests to influence professional judgment.',
                  11: 'Professional Competence', 12: 'and Due Care', 14: '',
                  15: 'Keep knowledge current; accept only work you are competent to perform; supervise junior staff appropriately.',
              },
              'slide5.xml': {
                  0: 'Principles 4-5: ', 1: 'Fundamental Principles',
                  3: 'Protect sensitive information obtained through professional work, unless disclosure is properly authorised or legally required.',
                  5: 'Comply with laws and regulations, and avoid conduct that could discredit the profession.',
              },
              'slide6.xml': {
                  0: 'Principles 4-5: ', 1: 'Applying the Concepts', 3: '', 4: 'Application: ',
                  5: 'Do not disclose client or employer information without authority; never use confidential information for personal gain.',
                  6: 'Exception: ',
                  7: 'Disclosure may be required by law, such as reporting suspected fraud to authorities.',
                  8: '05. Professional Behaviour', 9: 'Application: ',
                  10: "Follow all relevant laws and standards; avoid misleading claims or conduct that harms the profession's reputation.",
              },
              'slide7.xml': {
                  0: 'Case Study: Breach of Multiple Principles', 1: 'The Scenario',
                  2: 'Sarah is asked to defer $2 million of expenses to smooth quarterly earnings. The CEO says jobs are at risk, but Sarah knows the adjustment would make the financial statements misleading.',
                  3: 'Principle Breaches', 4: '1. Integrity: ', 5: 'Supports misleading reporting.',
                  6: '2. Objectivity: ', 7: 'CEO pressure overrides professional judgment.',
                  8: '3. Professional Behaviour: ', 9: 'Breaches accounting standards and corporate law.',
                  10: 'Outcomes', 11: 'ASIC investigation and financial restatement.',
                  12: 'Loss of CPA membership and potential penalties.',
                  13: 'Shareholder claims and reputational damage.',
              },
              'slide8.xml': {
                  2: 'The five fundamental principles provide the ethical foundation for professional accounting practice.',
                  4: 'They protect the public interest by sustaining trust in accountants and financial information.',
                  6: 'Accountants should use the conceptual framework to identify, evaluate, and address threats to ethical conduct.',
                  7: 'Ethical behaviour is not optional; it is a non-negotiable professional obligation.',
              },
              'slide9.xml': {
                  1: '',
                  2: 'Accounting Professional & Ethical Standards Board. (2018). APES 110 Code of ethics for professional accountants (including independence standards). https://www.apesb.edu.au/standards/apes-110-code-of-ethics/',
                  3: 'Auditing and Assurance Standards Board. (2019). ASA 102 Compliance with ethical requirements when performing audits, reviews and other assurance engagements. https://www.auasb.gov.au/standards/auditing-standards/asa-102/',
              },
              'slide10.xml': {0: 'Thank You', 1: 'Questions?'},
          }

          notes_replacements = {
              'notesSlide1.xml': {0: '28 May 2026', 1: 'Open by naming the topic and explaining why ethics matter in accounting. Emphasise that APES 110 is not only a compliance document; it is a public-interest framework for professional judgment.'},
              'notesSlide2.xml': {0: '28 May 2026', 1: 'Transition from the opening to the first three principles. Give the audience a simple listening task: notice how each principle protects the reliability of accounting work.'},
              'notesSlide3.xml': {0: '28 May 2026', 1: 'Use quick examples rather than reading each box. For integrity, mention refusing misleading reports. For objectivity, mention conflicts of interest. For competence, mention knowing when to seek advice or decline work.'},
              'notesSlide4.xml': {0: '28 May 2026', 1: 'Introduce confidentiality and professional behaviour as outward-facing responsibilities. Stress that accountants often handle sensitive information and represent the credibility of the profession.'},
              'notesSlide5.xml': {0: '28 May 2026', 1: 'Explain the difference between ordinary confidentiality and legal exceptions. Then connect professional behaviour to everyday conduct, such as honest communication and avoiding exaggerated claims.'},
              'notesSlide6.xml': {0: '28 May 2026', 1: 'Set up the case briefly, then ask the class what Sarah should do before revealing the breaches. Highlight that pressure from senior management is a threat, but it does not remove professional responsibility.'},
              'notesSlide7.xml': {0: '28 May 2026', 1: 'Close by linking the principles back to public trust. Remind the audience that the conceptual framework helps accountants move from recognising a risk to taking an appropriate action.', 2: 'End with one clear takeaway: ethical accounting is a professional obligation, not a personal preference. Invite questions and discussion.'},
              'notesSlide8.xml': {0: '28 May 2026', 1: 'Thank the audience and invite questions. If time allows, ask which principle they think is hardest to apply in real workplaces and why.'},
          }

          def replace_texts(path, replacements):
              tree = etree.parse(str(path))
              nodes = tree.xpath('//a:t', namespaces=ns)
              for idx, text in replacements.items():
                  if idx >= len(nodes):
                      raise IndexError(f'{path}: missing text node {idx}')
                  nodes[idx].text = text
                  if text.endswith(' '):
                      nodes[idx].set('{http://www.w3.org/XML/1998/namespace}space', 'preserve')
              tree.write(str(path), encoding='UTF-8', xml_declaration=True, standalone=False)

          for filename, replacements in slide_replacements.items():
              replace_texts(root / 'ppt' / 'slides' / filename, replacements)
          for filename, replacements in notes_replacements.items():
              replace_texts(root / 'ppt' / 'notesSlides' / filename, replacements)

          for folder in [root / 'ppt' / 'slides', root / 'ppt' / 'notesSlides']:
              for path in folder.glob('*.xml'):
                  text = path.read_text(encoding='utf-8')
                  text = text.replace('1.7.2013', '28 May 2026').replace('2026.05.28', '28 May 2026')
                  path.write_text(text, encoding='utf-8')
          PY

          python skills/pptx/scripts/clean.py work/pptx_unpacked
          python skills/pptx/scripts/office/pack.py work/pptx_unpacked "$OUTPUT_PPTX" --original "$INPUT_PPTX"
          python -m markitdown "$OUTPUT_PPTX" > work/revised_markitdown.md
          ! grep -E '1\.7\.2013|2013|2026\.05\.28|xxxx|lorem|ipsum|Application:Do|Application:Follow|Integrity:Supports|Objectivity:CEO|Behaviour:Breaches|Maintain Keep|References：|huge amount fine' work/revised_markitdown.md

          cat > output/change_log.md <<'EOF'
          # Change Log: 管会pre_revised.pptx

          Source file: `管会pre.pptx`  
          Revised file: `output/管会pre_revised.pptx`  
          Revision date: 28 May 2026

          ## Summary

          - Revised the presentation using the workflow in `skills/pptx/SKILL.md`: content extraction, XML unpacking, direct text/notes editing, cleanup, repacking, and content QA.
          - Preserved the original PowerPoint file and wrote the revised version to `output/管会pre_revised.pptx`.
          - Replaced all incorrect speaker-note dates `1.7.2013` with `28 May 2026`.
          - Updated the title slide date from `2026.05.28` to `28 May 2026`.
          - Improved English phrasing throughout the deck to make the language more natural, concise, and suitable for a university classroom presentation.
          - Standardised title capitalisation, punctuation, spacing, and label formatting.
          - Condensed the Case Study slide by shortening the scenario, principle breaches, and outcomes.
          - Rewrote speaker notes as oral presentation prompts instead of slide-reading scripts.
          - Reformatted the references slide closer to APA 7 style by using corporate authors, year formatting, sentence-case titles, and direct URLs.

          ## Slide-Level Changes

          | Slide | Main revisions |
          | --- | --- |
          | 1 | Updated title wording and date format. |
          | 3 | Clarified the APES 110 overview and improved principle descriptions. |
          | 4 | Improved application wording and removed duplicated wording. |
          | 5 | Improved wording for confidentiality and professional behaviour. |
          | 6 | Fixed label spacing and clarified application/exception language. |
          | 7 | Compressed the case study and corrected awkward phrasing in outcomes. |
          | 8 | Tightened conclusion language and made the final takeaway more formal. |
          | 9 | Cleaned the references heading and revised references toward APA 7 style. |
          | 10 | Simplified the closing slide to `Thank You` and `Questions?`. |

          ## Validation

          - `pack.py` validation passed when rebuilding `output/管会pre_revised.pptx`.
          - `markitdown` text extraction was run on the revised file to verify slide text and speaker notes.
          - Searched the revised output for stale dates, placeholder text, malformed labels, and common encoding artifacts.
          - Local visual rendering with `soffice`/`pdftoppm` could not be run in the Codex desktop environment because those executables were not available.
          EOF
          sed -i 's/^          //' output/change_log.md

          rm -f .github/workflows/revise-ppt.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/管会pre_revised.pptx output/change_log.md .github/workflows/revise-ppt.yml
          git commit -m "Revise presentation deck"
          git push origin "HEAD:${BRANCH_NAME}"
